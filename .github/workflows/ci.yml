name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Approve builds for native dependencies
        run: pnpm approve-builds esbuild @vscode/vsce-sign keytar

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm exec tsc

      - name: Build extension
        run: pnpm run build

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run unit tests
        run: xvfb-run -a pnpm test

      - name: Package VSIX
        run: pnpm run package
        continue-on-error: true

      - name: Upload VSIX artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: resource-properties-viewer-*.vsix
          retention-days: 7
