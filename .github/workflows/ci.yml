name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc

      - name: Build extension
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Package VSIX
        run: npm run package
        continue-on-error: true

      - name: Upload VSIX artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: resource-bundle-editor-*.vsix
          retention-days: 7