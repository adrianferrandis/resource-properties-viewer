# Configuración de la aplicación
# Este es un archivo de propiedades simple, no para i18n

app.name=Mi Aplicación Web
app.version=1.2.3
app.description=Una aplicación para gestionar recursos

# Configuración de base de datos
database.url=jdbc:mysql://localhost:3306/mydb
database.username=admin
database.password=secret123
database.pool.size=10

# Configuración de servidor
server.port=8080
server.host=0.0.0.0
server.timeout=30000
server.threads.max=50

# Configuración de correo
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls=true
mail.from=noreply@example.com

# Otras configuraciones
logging.level=INFO
cache.enabled=true
cache.ttl=3600
features.beta.enabled=false
