# Backslashes - deben preservarse
windows.path=C:\\\\Users\\\\Admin\\\\Documents\\\\file.txt
unix.path=/usr/local/bin/script.sh
escaped.tab=Column1\\tColumn2\\tColumn3
escaped.newline=Line1\\nLine2\\nLine3

# Espacios - deben preservarse
leading.spaces=   Value with leading spaces
trailing.spaces=Value with trailing spaces   
multiple.spaces=Value    with    multiple    spaces

# Formatos complejos
json.value={"key": "value", "nested": {"array": [1, 2, 3], "boolean": true}}
sql.query=SELECT * FROM users WHERE id = 1 AND status = 'active'
